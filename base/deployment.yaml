apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: rochdy/myk8sgitopsapp:v0.0.1
        ports:
        - containerPort: 3000
        env:
        - name: ENV_NAME
          value: "base"
